<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel — Malzz Pedia</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<nav class="navbar">
  <a href="/" class="nav-logo">Malzz Pedia</a>
  <ul class="nav-links">
    <li><a href="/admin" class="active">Admin</a></li>
    <li><a href="/mutasi">Mutasi</a></li>
    <li><a href="/" target="_blank">Lihat Site</a></li>
    <li><a href="#" onclick="doLogout()" style="color:var(--danger);">Logout</a></li>
  </ul>
</nav>

<div class="page-wrap">
  <div class="admin-layout">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-title">Menu</div>
      <a href="/admin" class="sidebar-link active">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/></svg>
        Produk
      </a>
      <a href="/mutasi" class="sidebar-link">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        Mutasi
      </a>
      <div class="divider"></div>
      <a href="/" target="_blank" class="sidebar-link">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        Lihat Site
      </a>
      <a href="#" onclick="doLogout()" class="sidebar-link" style="color:var(--danger);">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Logout
      </a>
    </div>

    <!-- Main Content -->
    <div class="admin-content">
      <!-- Header -->
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;">
        <div>
          <h1 style="font-family:'Space Grotesk',sans-serif;font-size:1.5rem;font-weight:700;">Manajemen Produk</h1>
          <p style="color:var(--muted2);font-size:0.875rem;margin-top:0.2rem;">Kelola produk yang tampil di halaman publik.</p>
        </div>
        <button class="btn btn-primary" onclick="openModal()">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Tambah Produk
        </button>
      </div>

      <!-- Stats -->
      <div class="grid-3 mb-3">
        <div class="card" style="padding:1.25rem;">
          <div style="font-size:0.75rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:0.5rem;">Total Produk</div>
          <div style="font-family:'Space Grotesk',sans-serif;font-size:1.75rem;font-weight:700;" id="stat-total">—</div>
        </div>
        <div class="card" style="padding:1.25rem;">
          <div style="font-size:0.75rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:0.5rem;">Produk Aktif</div>
          <div style="font-family:'Space Grotesk',sans-serif;font-size:1.75rem;font-weight:700;color:var(--success);" id="stat-active">—</div>
        </div>
        <div class="card" style="padding:1.25rem;">
          <div style="font-size:0.75rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:0.5rem;">Ditambah Hari Ini</div>
          <div style="font-family:'Space Grotesk',sans-serif;font-size:1.75rem;font-weight:700;color:var(--primary);" id="stat-today">—</div>
        </div>
      </div>

      <!-- Search -->
      <div class="search-wrap mb-2" style="max-width:360px;">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" class="form-control" id="admin-search" placeholder="Cari produk..." oninput="filterAdmin()">
      </div>

      <!-- Table -->
      <div class="card" style="padding:0;overflow:hidden;">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Produk</th>
                <th>Deskripsi</th>
                <th>Link Order</th>
                <th>Tanggal</th>
                <th>Aksi</th>
              </tr>
            </thead>
            <tbody id="product-tbody">
              <tr><td colspan="5" style="text-align:center;padding:2rem;color:var(--muted);"><div class="spinner" style="display:inline-block;margin-right:0.5rem;width:14px;height:14px;"></div> Memuat...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Add Product Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <h3 class="modal-title">Tambah Produk</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <form onsubmit="addProduct(event)">
      <div class="form-group">
        <label class="form-label">Nama Produk *</label>
        <input type="text" class="form-control" id="p-nama" placeholder="Mobile Legends, Free Fire..." required>
      </div>
      <div class="form-group">
        <label class="form-label">Deskripsi Singkat</label>
        <input type="text" class="form-control" id="p-deks" placeholder="Deskripsi singkat...">
      </div>
      <div class="form-group">
        <label class="form-label">Deskripsi Lengkap</label>
        <textarea class="form-control" id="p-fulldesk" rows="3" placeholder="Deskripsi lengkap produk..." style="resize:vertical;"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">URL Gambar</label>
        <input type="url" class="form-control" id="p-imageurl" placeholder="https://...">
      </div>
      <div class="form-group" style="margin-bottom:0;">
        <label class="form-label">Link Order</label>
        <input type="url" class="form-control" id="p-linkorder" placeholder="https://...">
      </div>
      <div class="divider"></div>
      <div style="display:flex;gap:0.75rem;justify-content:flex-end;">
        <button type="button" class="btn btn-secondary" onclick="closeModal()">Batal</button>
        <button type="submit" class="btn btn-primary" id="add-btn">Simpan Produk</button>
      </div>
    </form>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
let allProducts = [];
const today = new Date().toDateString();

async function loadProducts() {
  try {
    const res = await fetch('/produk');
    const json = await res.json();
    if (!json.success) throw new Error();
    allProducts = json.data;
    const todayCount = allProducts.filter(p => new Date(p.tanggal).toDateString() === today).length;
    document.getElementById('stat-total').textContent = allProducts.length;
    document.getElementById('stat-active').textContent = allProducts.length;
    document.getElementById('stat-today').textContent = todayCount;
    renderTable(allProducts);
  } catch(e) {
    showToast('Gagal memuat produk', 'error');
  }
}

function filterAdmin() {
  const q = document.getElementById('admin-search').value.toLowerCase();
  renderTable(allProducts.filter(p => p.nama?.toLowerCase().includes(q) || p.deks?.toLowerCase().includes(q)));
}

function renderTable(list) {
  const tbody = document.getElementById('product-tbody');
  if (!list.length) {
    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:3rem;color:var(--muted);">Tidak ada produk ditemukan</td></tr>';
    return;
  }
  tbody.innerHTML = list.map(p => `
    <tr>
      <td>
        <div style="display:flex;align-items:center;gap:0.75rem;">
          ${p.imageurl
            ? `<img src="${p.imageurl}" style="width:38px;height:38px;border-radius:8px;object-fit:cover;background:var(--bg2);" onerror="this.style.display='none'">`
            : `<div style="width:38px;height:38px;border-radius:8px;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:1rem;">🎮</div>`}
          <span style="font-weight:600;font-size:0.875rem;">${p.nama}</span>
        </div>
      </td>
      <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--muted2);font-size:0.8rem;">${p.deks || '—'}</td>
      <td>${p.linkorder ? `<a href="${p.linkorder}" target="_blank" style="color:var(--primary);font-size:0.8rem;">Lihat →</a>` : '<span style="color:var(--muted);">—</span>'}</td>
      <td style="color:var(--muted2);font-size:0.8rem;">${new Date(p.tanggal).toLocaleDateString('id-ID', {day:'numeric',month:'short',year:'numeric'})}</td>
      <td>
        <button class="btn btn-danger btn-sm" onclick="deleteProduct('${p._id}', this)">Hapus</button>
      </td>
    </tr>
  `).join('');
}

function openModal() {
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.getElementById('p-nama').value = '';
  document.getElementById('p-deks').value = '';
  document.getElementById('p-fulldesk').value = '';
  document.getElementById('p-imageurl').value = '';
  document.getElementById('p-linkorder').value = '';
}

async function addProduct(e) {
  e.preventDefault();
  const btn = document.getElementById('add-btn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner" style="width:14px;height:14px;"></div> Menyimpan...';

  try {
    const res = await fetch('/produk', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        nama: document.getElementById('p-nama').value,
        deks: document.getElementById('p-deks').value,
        fulldesk: document.getElementById('p-fulldesk').value,
        imageurl: document.getElementById('p-imageurl').value,
        linkorder: document.getElementById('p-linkorder').value,
      })
    });
    const json = await res.json();
    if (json.success) {
      showToast('Produk berhasil ditambahkan', 'success');
      closeModal();
      loadProducts();
    } else {
      showToast(json.message || 'Gagal menambahkan produk', 'error');
    }
  } catch(e) {
    showToast('Terjadi kesalahan', 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'Simpan Produk';
  }
}

async function deleteProduct(id, btn) {
  if (!confirm('Yakin hapus produk ini?')) return;
  btn.disabled = true;
  btn.textContent = '...';
  try {
    const res = await fetch(`/produk/${id}`, { method: 'DELETE' });
    const json = await res.json();
    if (json.success) {
      showToast('Produk dihapus', 'success');
      loadProducts();
    } else {
      showToast(json.message, 'error');
      btn.disabled = false;
      btn.textContent = 'Hapus';
    }
  } catch(e) {
    showToast('Gagal menghapus', 'error');
    btn.disabled = false;
    btn.textContent = 'Hapus';
  }
}

async function doLogout() {
  await fetch('/logout');
  window.location.href = '/login';
}

function showToast(msg, type='info') {
  const tc = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  const icons = { success: '✅', error: '❌', info: 'ℹ️' };
  t.innerHTML = `<span class="toast-icon">${icons[type]}</span> ${msg}`;
  tc.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

// Guard: redirect if not logged in
fetch('/api/mutasi').then(r => {
  if (r.status === 401) window.location.href = '/login';
});

// Close modal on overlay click
document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

loadProducts();
</script>
</body>
</html>
