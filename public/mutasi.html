<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mutasi Transaksi — Malzz Pedia</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<nav class="navbar">
  <a href="/" class="nav-logo">Malzz Pedia</a>
  <ul class="nav-links">
    <li><a href="/admin">Admin</a></li>
    <li><a href="/mutasi" class="active">Mutasi</a></li>
    <li><a href="/" target="_blank">Lihat Site</a></li>
    <li><a href="#" onclick="doLogout()" style="color:var(--danger);">Logout</a></li>
  </ul>
</nav>

<div class="page-wrap">
  <div class="admin-layout">
    <div class="sidebar">
      <div class="sidebar-title">Menu</div>
      <a href="/admin" class="sidebar-link">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/></svg>
        Produk
      </a>
      <a href="/mutasi" class="sidebar-link active">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        Mutasi
      </a>
      <div class="divider"></div>
      <a href="/" target="_blank" class="sidebar-link">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        Lihat Site
      </a>
      <a href="#" onclick="doLogout()" class="sidebar-link" style="color:var(--danger);">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Logout
      </a>
    </div>

    <div class="admin-content">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;flex-wrap:wrap;gap:1rem;">
        <div>
          <h1 style="font-family:'Space Grotesk',sans-serif;font-size:1.5rem;font-weight:700;">Riwayat Transaksi</h1>
          <p style="color:var(--muted2);font-size:0.875rem;margin-top:0.2rem;">Semua mutasi deposit dan order.</p>
        </div>
        <button class="btn btn-secondary btn-sm" onclick="loadMutasi()">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
          Refresh
        </button>
      </div>

      <!-- Summary Cards -->
      <div class="grid-4 mb-3">
        <div class="card" style="padding:1.1rem;">
          <div style="font-size:0.7rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:0.5rem;">Total Transaksi</div>
          <div style="font-family:'Space Grotesk',sans-serif;font-size:1.5rem;font-weight:700;" id="s-total">—</div>
        </div>
        <div class="card" style="padding:1.1rem;border-top:2px solid var(--success);">
          <div style="font-size:0.7rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:0.5rem;">Sukses</div>
          <div style="font-family:'Space Grotesk',sans-serif;font-size:1.5rem;font-weight:700;color:var(--success);" id="s-success">—</div>
        </div>
        <div class="card" style="padding:1.1rem;border-top:2px solid var(--primary);">
          <div style="font-size:0.7rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:0.5rem;">Total Untung</div>
          <div style="font-family:'Space Grotesk',sans-serif;font-size:1.5rem;font-weight:700;color:var(--primary);" id="s-untung">—</div>
        </div>
        <div class="card" style="padding:1.1rem;border-top:2px solid var(--warning);">
          <div style="font-size:0.7rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:0.5rem;">Pending</div>
          <div style="font-family:'Space Grotesk',sans-serif;font-size:1.5rem;font-weight:700;color:var(--warning);" id="s-pending">—</div>
        </div>
      </div>

      <!-- Filter -->
      <div style="display:flex;gap:0.75rem;align-items:center;margin-bottom:1.25rem;flex-wrap:wrap;">
        <div class="search-wrap" style="flex:1;min-width:180px;max-width:320px;">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="text" class="form-control" id="mutasi-search" placeholder="Cari ID, tujuan..." oninput="filterMutasi()">
        </div>
        <select class="form-control" id="status-filter" onchange="filterMutasi()" style="max-width:160px;">
          <option value="">Semua Status</option>
          <option value="success">Sukses</option>
          <option value="menunggu_pembayaran">Menunggu Bayar</option>
          <option value="pending">Pending</option>
          <option value="failed">Gagal</option>
        </select>
      </div>

      <!-- Table -->
      <div class="card" style="padding:0;overflow:hidden;">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>ID Transaksi</th>
                <th>Tujuan</th>
                <th>Produk</th>
                <th>Nominal</th>
                <th>Untung</th>
                <th>Deposit</th>
                <th>Order</th>
                <th>Tanggal</th>
              </tr>
            </thead>
            <tbody id="mutasi-tbody">
              <tr><td colspan="8" style="text-align:center;padding:2.5rem;color:var(--muted);"><div class="spinner" style="display:inline-block;margin-right:0.5rem;width:14px;height:14px;"></div> Memuat...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
      <p id="mutasi-count" style="font-size:0.78rem;color:var(--muted);margin-top:0.75rem;"></p>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
let allMutasi = [];

const statusDepositMap = {
  success: { label: 'Sukses', cls: 'badge-success' },
  menunggu_pembayaran: { label: 'Menunggu', cls: 'badge-warning' },
  pending: { label: 'Pending', cls: 'badge-warning' },
  failed: { label: 'Gagal', cls: 'badge-danger' },
};
const statusOrderMap = {
  success: { label: 'Sukses', cls: 'badge-success' },
  pending: { label: 'Pending', cls: 'badge-warning' },
  process: { label: 'Proses', cls: 'badge-purple' },
  failed: { label: 'Gagal', cls: 'badge-danger' },
  gagal_buat_order: { label: 'Error', cls: 'badge-danger' },
};

async function loadMutasi() {
  const tbody = document.getElementById('mutasi-tbody');
  tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:2.5rem;color:var(--muted);"><div class="spinner" style="display:inline-block;margin-right:0.5rem;width:14px;height:14px;"></div> Memuat...</td></tr>';
  try {
    const res = await fetch('/api/mutasi');
    if (res.status === 401) { window.location.href = '/login'; return; }
    const json = await res.json();
    if (!json.success) throw new Error();
    allMutasi = json.data;
    updateSummary(allMutasi);
    renderMutasi(allMutasi);
  } catch(e) {
    tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:2.5rem;color:var(--danger);">Gagal memuat data</td></tr>';
  }
}

function updateSummary(data) {
  document.getElementById('s-total').textContent = data.length;
  document.getElementById('s-success').textContent = data.filter(d => d.statusDeposit === 'success').length;
  const totalUntung = data.reduce((acc, d) => acc + (d.untung || 0), 0);
  document.getElementById('s-untung').textContent = 'Rp ' + totalUntung.toLocaleString('id-ID');
  document.getElementById('s-pending').textContent = data.filter(d => d.statusDeposit !== 'success').length;
}

function filterMutasi() {
  const q = document.getElementById('mutasi-search').value.toLowerCase();
  const sf = document.getElementById('status-filter').value;
  const filtered = allMutasi.filter(d => {
    const matchQ = !q || d.internalTrxId?.toLowerCase().includes(q) || d.tujuan?.toLowerCase().includes(q) || d.productCode?.toLowerCase().includes(q) || d.idOrder?.toLowerCase().includes(q);
    const matchS = !sf || d.statusDeposit === sf;
    return matchQ && matchS;
  });
  renderMutasi(filtered);
}

function renderMutasi(list) {
  const tbody = document.getElementById('mutasi-tbody');
  document.getElementById('mutasi-count').textContent = `Menampilkan ${list.length} transaksi`;
  if (!list.length) {
    tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:3rem;color:var(--muted);">Tidak ada data</td></tr>';
    return;
  }
  tbody.innerHTML = list.map(d => {
    const dep = statusDepositMap[d.statusDeposit] || { label: d.statusDeposit, cls: 'badge-gray' };
    const ord = statusOrderMap[d.statusOrder] || { label: d.statusOrder, cls: 'badge-gray' };
    return `
      <tr>
        <td style="font-family:monospace;font-size:0.75rem;color:var(--muted2);">${(d.internalTrxId || '').substring(0,12)}...</td>
        <td style="font-weight:600;font-size:0.875rem;">${d.tujuan || '—'}</td>
        <td style="font-size:0.8rem;color:var(--muted2);">${d.productCode || '—'}</td>
        <td style="font-weight:600;font-size:0.875rem;">${d.nominalDeposit ? 'Rp ' + d.nominalDeposit.toLocaleString('id-ID') : '—'}</td>
        <td style="font-weight:700;color:${(d.untung || 0) > 0 ? 'var(--success)' : 'var(--muted)'};">
          ${d.untung ? 'Rp ' + d.untung.toLocaleString('id-ID') : '—'}
        </td>
        <td><span class="badge ${dep.cls}">${dep.label}</span></td>
        <td><span class="badge ${ord.cls}">${ord.label}</span></td>
        <td style="font-size:0.78rem;color:var(--muted2);white-space:nowrap;">${new Date(d.tanggal).toLocaleString('id-ID', {day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})}</td>
      </tr>
    `;
  }).join('');
}

async function doLogout() {
  await fetch('/logout');
  window.location.href = '/login';
}

function showToast(msg, type='info') {
  const tc = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  const icons = { success: '✅', error: '❌', info: 'ℹ️' };
  t.innerHTML = `<span class="toast-icon">${icons[type]}</span> ${msg}`;
  tc.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

loadMutasi();
</script>
</body>
</html>
